<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ánima Telemetry V4 - UI Ajustada</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        /* Bloqueo absoluto de scroll y ajuste al 100% exacto de la pantalla */
        body {
            background-color: #0a0a0a; color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            text-align: center; margin: 0; padding: 2vh 2vw;
            display: flex; flex-direction: column;
            justify-content: space-between; 
            height: 100vh; /* Ocupa exactamente el 100% del alto */
            box-sizing: border-box;
            overflow: hidden; /* Prohíbe hacer scroll */
        }

        #estado { color: #ff3366; font-weight: bold; visibility: hidden; font-size: 0.8rem; margin-bottom: 2px;}

        /* Contenedor flexible que aprieta los elementos */
        .contenedor-medidores { 
            display: flex; flex-direction: row; flex-wrap: wrap; 
            justify-content: center; align-content: center; gap: 5px; 
            flex-grow: 1; /* Toma todo el espacio disponible */
        }

        .medidor { 
            background: rgba(255,255,255,0.05); 
            border-radius: 8px; padding: 5px; width: 46%;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* Semáforo Launch Control - Más ancho pero más corto */
        .semaforo-container { width: 95%; flex-direction: row; justify-content: space-around; align-items: center; border: 2px solid #444; padding: 2px;}
        .luces { display: flex; gap: 10px; }
        .luz { width: 25px; height: 25px; border-radius: 50%; background-color: #222; border: 2px solid #000; box-shadow: inset 0 0 10px #000; }
        .luz.rojo-on { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .luz.verde-on { background-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .texto-launch { font-size: 1.2rem; font-weight: bold; color: #888; }

        .valor-gigante { font-size: 2.2rem; font-weight: bold; margin: 0; color: #ffffff; }
        .etiqueta { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .crono-container { border: 2px solid #ffaa00; }
        .valor-crono { font-size: 1.8rem; color: #ffaa00; font-weight: bold; margin: 0;}

        /* Botones reducidos para no robar pantalla */
        .panel-botones { display: flex; flex-direction: row; gap: 10px; justify-content: center; width: 100%; margin-top: 5px;}
        button { 
            padding: 8px; font-size: 1rem; font-weight: bold; 
            border: none; border-radius: 8px; text-transform: uppercase; 
            cursor: pointer; width: 45%; 
        }
        #btn-iniciar { background-color: #00ffcc; color: #000; }
        #btn-detener { background-color: #ff3366; color: #fff; display: none; }

        /* Ajustes específicos para cuando acuestes el teléfono (Motorcycle Mode) */
        @media (orientation: landscape) {
            .semaforo-container { width: 40%; }
            .medidor { width: 22%; }
            .valor-gigante { font-size: 2.5rem; }
            .valor-crono { font-size: 2rem; }
            button { padding: 5px; } /* Botones aún más delgados en horizontal */
        }
    </style>
</head>
<body>

    <div id="estado">● GRABANDO TELEMETRÍA</div>
        
    <div class="contenedor-medidores">
        
        <div class="medidor semaforo-container">
            <div class="texto-launch" id="texto-semaforo">STANDBY</div>
            <div class="luces">
                <div class="luz" id="luz-roja"></div>
                <div class="luz" id="luz-verde"></div>
            </div>
        </div>

        <div class="medidor">
            <div class="etiqueta">Velocidad</div>
            <div class="valor-gigante" id="display-velocidad">0</div>
        </div>

        <div class="medidor">
            <div class="etiqueta">Inclinación</div>
            <div class="valor-gigante" id="display-angulo">0°</div>
        </div>

        <div class="medidor crono-container">
            <div class="etiqueta">0-60 KM/H</div>
            <div class="valor-crono" id="display-0-60">-- s</div>
        </div>

        <div class="medidor crono-container">
            <div class="etiqueta">0-100 KM/H</div>
            <div class="valor-crono" id="display-0-100">-- s</div>
        </div>
    </div>

    <div class="panel-botones">
        <button id="btn-iniciar" onclick="iniciarTelemetria()">Iniciar</button>
        <button id="btn-detener" onclick="descargarCSV()">Finalizar</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
