<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ánima Telemetry V4 - UI Ajustada</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        body {
            background-color: #0a0a0a; color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            text-align: center; margin: 0; padding: 1vh 2vw;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            box-sizing: border-box; overflow: hidden;
        }

        #estado { color: #ff3366; font-size: 0.7rem; height: 3vh; margin: 0; }

        .contenedor-medidores { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 5px; flex: 1; /* Ocupa el espacio central */
        }

        .medidor { 
            background: rgba(255,255,255,0.05); border-radius: 8px;
            width: 47%; height: 22vh; /* Alto fijo basado en la pantalla */
            display: flex; flex-direction: column; justify-content: center;
        }

        /* Semáforo ultra-compacto */
        .semaforo-container { 
            width: 97%; height: 12vh; flex-direction: row !important; 
            border: 1px solid #444; padding: 0 10px;
        }
        .luces { display: flex; gap: 20px; }
        .luz { width: 30px; height: 30px; border-radius: 50%; background-color: #222; }
        .luz.rojo-on { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .luz.verde-on { background-color: #00ff00; box-shadow: 0 0 15px #00ff00; }

        .valor-gigante { font-size: 2rem; font-weight: bold; color: #fff; margin: 0; }
        .etiqueta { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .valor-crono { font-size: 1.7rem; color: #ffaa00; font-weight: bold; }

        /* Panel de botones siempre visible */
        .panel-botones { 
            height: 12vh; display: flex; align-items: center; 
            justify-content: center; gap: 10px; padding-bottom: 2vh;
        }
        button { 
            height: 8vh; width: 45%; font-size: 1.1rem; 
            font-weight: bold; border-radius: 10px; border: none;
        }
        #btn-iniciar { background-color: #00ffcc; color: #000; }
        #btn-detener { background-color: #ff3366; color: #fff; display: none; }

        @media (orientation: landscape) {
            .medidor { width: 23%; height: 35vh; }
            .semaforo-container { width: 48%; height: 35vh; flex-direction: column !important; }
            .panel-botones { height: 15vh; }
        }
    </style>
</head>
<body>
    <div id="estado">● GRABANDO TELEMETRÍA</div>
        
    <div class="contenedor-medidores">
        <div class="medidor semaforo-container">
            <div class="etiqueta" id="texto-semaforo">STANDBY</div>
            <div class="luces">
                <div class="luz" id="luz-roja"></div>
                <div class="luz" id="luz-verde"></div>
            </div>
        </div>

        <div class="medidor">
            <div class="etiqueta">Velocidad</div>
            <div class="valor-gigante" id="display-velocidad">0</div>
            <div class="etiqueta">KM/H</div>
        </div>

        <div class="medidor">
            <div class="etiqueta">Inclinación</div>
            <div class="valor-gigante" id="display-angulo">0°</div>
        </div>

        <div class="medidor crono-container">
            <div class="etiqueta">0-60 KM/H</div>
            <div class="valor-crono" id="display-0-60">-- s</div>
        </div>

        <div class="medidor crono-container">
            <div class="etiqueta">0-100 KM/H</div>
            <div class="valor-crono" id="display-0-100">-- s</div>
        </div>
    </div>

    <div class="panel-botones">
        <button id="btn-iniciar" onclick="iniciarTelemetria()">Iniciar</button>
        <button id="btn-detener" onclick="descargarCSV()">Finalizar</button>
    </div>
    <script src="app.js"></script>
</body>
